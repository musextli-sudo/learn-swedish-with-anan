<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Swedish with AnAn 🐻</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 新增功能样式 -->
    <style>
        .progress-container { width: 100%; background: #e2ece9; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-bar { height: 15px; background: #2e5a44; width: 0%; transition: width 0.4s; }
        .flashcard-container { perspective: 1000px; width: 300px; margin: 20px auto; cursor: pointer; }
        .flashcard { position: relative; width: 100%; height: 150px; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border: 2px solid #2e5a44; border-radius: 15px; background: white; }
        .back { transform: rotateY(180deg); background: #e8f8f5; }
    </style>
</head>
<body>

    <!-- 插入进度条 -->
    <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>

    <!-- [这里是你的原始 HTML 代码，完全保留不变] -->
    <div class="container">
        <!-- (此处略去你原有的 Header 等内容) -->
        
        <!-- 在 Vocabulary 链接或对应的 div 中加入翻转逻辑 -->
        <div id="level-vocabulary" class="level-content">
            <div class="flashcard-container">
                <div class="flashcard" onclick="this.classList.toggle('flipped'); updateProgress(20);">
                    <div class="front">Hej</div>
                    <div class="back">Hello</div>
                </div>
            </div>
        </div>

        <!-- [你所有的 Episode 列表、Ep 3 Coming Soon、Quiz 逻辑等全部保留] -->
    </div>

    <!-- 脚本逻辑 -->
    <script>
        let progress = 0;
        function updateProgress(val) {
            progress = Math.min(progress + val, 100);
            document.getElementById('progress-bar').style.width = progress + '%';
        }
        // [此处保留你原有的所有 JavaScript 函数]
    </script>
</body>
</html>
