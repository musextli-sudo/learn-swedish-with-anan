<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Swedish with AnAn 🐻</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary-color: #2e5a44;
            --accent-color: #117a65;
            --bg-color: #f7faf9;
            --border-color: #e2ece9;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: #fcfcfc; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }

        /* Header */
        .header-banner { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #e2ece9, #c2dcd3); border-radius: 16px; margin-bottom: 30px; }
        .header-banner h1 { margin: 0; color: #2c3e50; }

        /* Navigation */
        .nav-tabs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; background: var(--bg-color); padding: 10px; border-radius: 30px; border: 1px solid var(--border-color); margin-bottom: 30px; }
        .tab-btn { padding: 10px 20px; border-radius: 20px; border: 2px solid transparent; background: #fff; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--primary-color); color: #fff; }
        .tab-btn.locked { opacity: 0.5; cursor: not-allowed; }

        /* Content */
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Units & Cards */
        .unit-card { background: #fff; border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .unit-title { color: var(--primary-color); border-bottom: 2px solid #f0f4f2; padding-bottom: 10px; display: flex; justify-content: space-between; }
        
        .episode-list { list-style: none; padding: 0; display: grid; gap: 10px; }
        .episode-item a { display: block; padding: 12px; background: #f9f9f9; border-radius: 8px; text-decoration: none; color: #333; transition: 0.2s; }
        .episode-item a:hover { background: var(--primary-color); color: #fff; }

        /* Quiz Config */
        .quiz-option-item { display: flex; align-items: center; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
        .quiz-start-btn { width: 100%; padding: 15px; background: var(--accent-color); color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 15px; }
        .quiz-start-btn:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div class="container">
        <header class="header-banner">
            <h1>Learn Swedish with AnAn 🐻</h1>
            <p>Master Swedish step by step through stories.</p>
        </header>

        <!-- Navigation -->
        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="showSection('intro')">🌟 Intro</button>
            <button class="tab-btn locked">🔒 Beginner</button>
            <button class="tab-btn locked">🔒 Intermediate</button>
            <button class="tab-btn" onclick="showSection('quizzes')">🧩 Quizzes</button>
            <button class="tab-btn" onclick="showSection('about')">ℹ️ About</button>
        </nav>

        <!-- Sections -->
        <section id="intro" class="page-section active">
            <div class="unit-card">
                <h3 class="unit-title">Unit 1: First Meeting <span>01 / 10</span></h3>
                <ul class="episode-list">
                    <li class="episode-item"><a href="episodes/episode1.html">Ep 1: Hej Sweden! ✈️</a></li>
                </ul>
            </div>
        </section>

        <section id="quizzes" class="page-section">
            <div class="unit-card">
                <h3>🧩 Custom Review Center</h3>
                <label class="quiz-option-item">
                    <input type="checkbox" checked onchange="updateQuizBtn()"> Ep 1: Hej Sweden!
                </label>
                <button id="start-quiz-btn" class="quiz-start-btn" onclick="launchQuiz()">Start Quiz</button>
            </div>
        </section>

        <section id="about" class="page-section">
            <div class="unit-card">
                <h3>Welcome!</h3>
                <p>Interactive Swedish learning through the stories of AnAn's family.</p>
            </div>
        </section>
    </div>

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function updateQuizBtn() {
            const checked = document.querySelectorAll('input:checked').length;
            const btn = document.getElementById('start-quiz-btn');
            btn.disabled = checked === 0;
            btn.innerText = checked > 0 ? `🚀 Start Quiz (${checked} selected)` : "Please select an episode";
        }

        function launchQuiz() {
            window.location.href = "quizzes/quiz_ep1.html";
        }
    </script>
</body>
</html>
