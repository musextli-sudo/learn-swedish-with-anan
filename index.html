<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Swedish with AnAn 🐻</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 🚀 Upgraded Navigation with Separator Grouping */
        .level-tabs {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background-color: #f7faf9;
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid #e2ece9;
        }
        
        .tab-group-main { display: flex; gap: 10px; flex-wrap: wrap; }
        .tab-group-support { display: flex; gap: 10px; flex-wrap: wrap; }

        .tab-divider {
            width: 2px;
            height: 28px;
            background-color: #cbdcd6;
            margin: 0 10px;
            align-self: center;
        }

        @media (max-width: 768px) {
            .tab-divider { display: none; }
            .level-tabs { border-radius: 15px; }
        }

        .tab-btn {
            padding: 10px 20px;
            background-color: #ffffff;
            border: 2px solid #e2ece9;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            color: #555;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }
        .tab-btn:not(.locked-tab):hover { background-color: #e2ece9; }
        .tab-btn.active {
            background-color: #2e5a44 !important;
            color: white !important;
            border-color: #2e5a44 !important;
            box-shadow: 0 4px 10px rgba(46, 90, 68, 0.2);
            opacity: 1 !important;
        }
        
        .tab-btn.locked-tab {
            background-color: #fafbfc !important;
            border-color: #eef2f0 !important;
            color: #b2c4bc !important;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .tab-btn.about-style { background-color: #fcf3cf; border-color: #f9e79f; color: #b7950b; }
        .tab-btn.quiz-style { background-color: #e8f8f5; border-color: #a3e4d7; color: #117a65; }

        .level-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .level-content.active { display: block; }
        
        .unit-card {
            background: white;
            border: 1px solid #e2ece9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        
        .episode-list { list-style: none; padding: 0; display: grid; gap: 12px; }
        .episode-item a { display: block; padding: 10px 15px; background: #fafbfc; border: 1px solid #eef2f0; border-radius: 6px; color: #2c3e50; text-decoration: none; }
        .episode-item.locked a { background: #f5f5f5; color: #bdc3c7; cursor: not-allowed; pointer-events: none; }

        .quiz-config-container { background: #fafbfc; border: 1px solid #cbdcd6; border-radius: 12px; padding: 25px; margin-top: 20px; max-width: 650px; }
        .quiz-start-btn { display: block; width: 100%; padding: 15px; background-color: #117a65; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .quiz-start-btn.disabled { background-color: #bdc3c7; cursor: not-allowed; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div style="text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #e2ece9 0%, #c2dcd3 100%); border-radius: 12px; margin-bottom: 30px;">
            <h1 style="font-size: 2.5rem; color: #2c3e50; margin: 0;">Learn Swedish with AnAn 🐻</h1>
        </div>

        <div class="level-tabs">
            <div class="tab-group-main">
                <button class="tab-btn active" onclick="switchLevel('intro', event)">🌟 Introductory</button>
                <button class="tab-btn locked-tab" onclick="switchLevel('beginner', event)">🔒 🌱 Beginner</button>
                <button class="tab-btn locked-tab" onclick="switchLevel('intermediate', event)">🔒 🚀 Intermediate</button>
                <button class="tab-btn locked-tab" onclick="switchLevel('advanced', event)">🔒 🏆 Advanced</button>
            </div>
            <div class="tab-divider"></div>
            <div class="tab-group-support">
                <button class="tab-btn quiz-style" onclick="switchLevel('quizzes', event)">🧩 Review Quizzes</button>
                <button class="tab-btn about-style" onclick="switchLevel('about', event)">ℹ️ About & Characters</button>
                <a href="vocabulary/vocabulary.html" class="tab-btn vocab-style">📖 Vocabulary</a>
            </div>
        </div>

        <div id="level-intro" class="level-content active">
            <h3 style="color: #2e5a44;">📚 Episodes</h3>
            <ul class="episode-list">
                <li class="episode-item"><a href="episodes/episode1.html"><strong>Ep 1:</strong> Hej Sweden! ✈️</a></li>
                <li class="episode-item"><a href="episodes/episode2.html"><strong>Ep 2:</strong> Min familj och mitt liv 🏠</a></li>
            </ul>
        </div>

        <div id="level-quizzes" class="level-content">
            <div class="quiz-config-container">
                <button id="start-quiz-btn" class="quiz-start-btn" onclick="launchQuiz()">🚀 Start Quiz</button>
            </div>
        </div>

        <div id="level-about" class="level-content">
            <div class="unit-card"><h3>Meet AnAn's Family 🧑‍🤝‍🧑</h3></div>
        </div>

        <footer style="margin-top: 50px; padding: 20px; text-align: center; color: #95a5a6; font-size: 0.9rem;">
            <p>&copy; 2026 Learn Swedish with AnAn. All Rights Reserved.</p>
        </footer>
    </div>

    <script>
        function switchLevel(levelId, event) {
            if (event.currentTarget.classList.contains('locked-tab')) return;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.querySelectorAll('.level-content').forEach(c => c.classList.remove('active'));
            document.getElementById('level-' + levelId).classList.add('active');
        }

        function launchQuiz() { /* 原有逻辑 */ }
    </script>
</body>
</html>
