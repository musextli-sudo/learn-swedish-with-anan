<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Swedish with AnAn 🐻</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* [你的原始 CSS 完全保留] */
        .level-tabs { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; background-color: #f7faf9; padding: 10px 15px; border-radius: 30px; border: 1px solid #e2ece9; }
        .tab-group-main { display: flex; gap: 10px; flex-wrap: wrap; }
        .tab-group-support { display: flex; gap: 10px; flex-wrap: wrap; }
        .tab-divider { width: 2px; height: 28px; background-color: #cbdcd6; margin: 0 10px; align-self: center; }
        @media (max-width: 768px) { .tab-divider { display: none; } .level-tabs { border-radius: 15px; } }
        .tab-btn { padding: 10px 20px; background-color: #ffffff; border: 2px solid #e2ece9; border-radius: 25px; cursor: pointer; font-weight: bold; color: #555; transition: all 0.2s ease; font-size: 0.95rem; }
        .tab-btn:not(.locked-tab):hover { background-color: #e2ece9; }
        .tab-btn.active { background-color: #2e5a44 !important; color: white !important; border-color: #2e5a44 !important; box-shadow: 0 4px 10px rgba(46, 90, 68, 0.2); opacity: 1 !important; }
        .tab-btn.locked-tab { background-color: #fafbfc !important; border-color: #eef2f0 !important; color: #b2c4bc !important; cursor: not-allowed; opacity: 0.6; box-shadow: none !important; }
        .tab-btn.about-style { background-color: #fcf3cf; border-color: #f9e79f; color: #b7950b; }
        .tab-btn.quiz-style { background-color: #e8f8f5; border-color: #a3e4d7; color: #117a65; }
        .level-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .level-content.active { display: block; }
        .unit-card { background: white; border: 1px solid #e2ece9; border-radius: 10px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); transition: all 0.3s; }
        .unit-card.locked { background: #fafafa; border: 1px dashed #ccc; box-shadow: none; opacity: 0.5; }
        .unit-title { color: #2e5a44; margin-top: 0; margin-bottom: 10px; font-size: 1.2rem; border-bottom: 2px solid #f0f4f2; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .episode-list { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
        .episode-item a { display: block; padding: 10px 15px; background: #fafbfc; border: 1px solid #eef2f0; border-radius: 6px; color: #2c3e50; text-decoration: none; font-size: 0.95rem; transition: all 0.2s; }
        .episode-item a:hover { background: #2e5a44; color: white; transform: translateY(-2px); }
        .episode-item.locked a { background: #f5f5f5 !important; color: #bdc3c7 !important; border: 1px solid #e5e5e5 !important; cursor: not-allowed; pointer-events: none; }
        .locked-msg { color: #95a5a6; font-style: italic; text-align: center; padding: 40px 20px; background: #fafafa; border-radius: 8px; border: 1px dashed #ddd; }
        .char-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .char-card { background: #fff; border: 1px solid #e2ece9; border-radius: 8px; padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .char-avatar { font-size: 3rem; margin-bottom: 10px; display: inline-block; }
        .quiz-config-container { background: #fafbfc; border: 1px solid #cbdcd6; border-radius: 12px; padding: 25px; margin-top: 20px; max-width: 650px; box-shadow: 0 4px 15px rgba(46, 90, 68, 0.03); }
        .quiz-select-label { display: block; font-weight: bold; color: #117a65; margin-bottom: 15px; font-size: 1.1rem; }
        .quiz-options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .quiz-option-item { display: flex; align-items: center; padding: 12px 15px; background: white; border: 2px solid #e2ece9; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; }
        .quiz-start-btn { display: block; width: 100%; padding: 15px; background-color: #117a65; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .quiz-start-btn.disabled { background-color: #bdc3c7 !important; cursor: not-allowed; }
        
        /* 增加的功能样式 (进度条 & 翻卡) */
        .progress-container { width: 100%; background: #e2ece9; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-bar { height: 15px; background: #2e5a44; width: 0%; transition: width 0.4s; }
        .flashcard-container { perspective: 1000px; width: 100%; max-width: 300px; margin: 20px auto; cursor: pointer; }
        .flashcard { position: relative; width: 100%; height: 150px; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border: 2px solid #2e5a44; border-radius: 15px; font-size: 1.2rem; background: white; }
        .back { transform: rotateY(180deg); background: #e8f8f5; color: #117a65; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div style="text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #e2ece9 0%, #c2dcd3 100%); border-radius: 12px; margin-bottom: 30px;">
            <h1 style="font-size: 2.5rem; color: #2c3e50; margin: 0;">Learn Swedish with AnAn 🐻</h1>
            <p style="font-size: 1.1rem; color: #52615c; margin-top: 10px;">Follow AnAn's family and master Swedish step by step!</p>
        </div>

        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>

        <div class="level-tabs">
            <div class="tab-group-main">
                <button class="tab-btn active" onclick="switchLevel('intro', event)">🌟 Introductory</button>
                <button class="tab-btn locked-tab">🔒 Beginner</button>
                <button class="tab-btn locked-tab">🔒 Intermediate</button>
                <button class="tab-btn locked-tab">🔒 Advanced</button>
            </div>
            <div class="tab-divider"></div>
            <div class="tab-group-support">
                <button class="tab-btn quiz-style" onclick="switchLevel('quizzes', event)">🧩 Review Quizzes</button>
                <button class="tab-btn" onclick="switchLevel('flashcards', event)">🃏 Flashcards</button>
                <button class="tab-btn about-style" onclick="switchLevel('about', event)">ℹ️ About & Characters</button>
                <a href="vocabulary/vocabulary.html" class="tab-btn" style="text-decoration:none;">📖 Vocabulary</a>
            </div>
        </div>

        <div id="level-intro" class="level-content active">
            <h3 style="color: #2e5a44;">📚 Episodes</h3>
            <ul class="episode-list">
                <li class="episode-item"><a href="episodes/episode1.html">Ep 1: Hej Sweden! ✈️</a></li>
                <li class="episode-item"><a href="episodes/episode2.html">Ep 2: Min familj 🏠</a></li>
            </ul>
        </div>

        <div id="level-quizzes" class="level-content">
            <div class="quiz-config-container">
                <button id="start-quiz-btn" class="quiz-start-btn" onclick="launchQuiz()">🚀 Start Quiz</button>
            </div>
        </div>

        <div id="level-flashcards" class="level-content">
            <div class="flashcard-container">
                <div class="flashcard" onclick="this.classList.toggle('flipped'); updateProgress(20);">
                    <div class="front">Hej (点击翻转)</div>
                    <div class="back">Hello</div>
                </div>
            </div>
        </div>

        <div id="level-about" class="level-content">
            <h3>Meet AnAn's Family 🧑‍🤝‍🧑</h3>
            <div class="char-grid">
                <div class="char-card"><div class="char-avatar">👧</div><h4>NiuNiu</h4></div>
                <div class="char-card"><div class="char-avatar">👦</div><h4>AnAn</h4></div>
            </div>
        </div>
    </div>

    <script>
        function switchLevel(levelId, event) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
            document.querySelectorAll('.level-content').forEach(c => c.classList.remove('active'));
            document.getElementById('level-' + levelId).classList.add('active');
        }
        
        let progress = 0;
        function updateProgress(val) {
            progress = Math.min(progress + val, 100);
            document.getElementById('progress-bar').style.width = progress + '%';
        }
    </script>
</body>
</html>
